<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyLabRobot Runner</title>
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #eee; }

    /* Header */
    .header {
      height: 48px; background: #16213e; display: flex; align-items: center;
      padding: 0 16px; border-bottom: 2px solid #0f3460; gap: 12px;
    }
    .header h1 { font-size: 16px; color: #e94560; white-space: nowrap; }

    .toolbar { display: flex; align-items: center; gap: 6px; }
    .toolbar button {
      padding: 4px 12px; border: 1px solid #444; background: #16213e; color: #eee;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .toolbar button:hover { background: #0f3460; }
    .toolbar button.primary { background: #0f3460; border-color: #e94560; }
    .toolbar button.primary:hover { background: #e94560; }

    #protocol-name {
      font-size: 13px; color: #aaa; font-family: monospace;
      margin-left: 8px; margin-right: auto;
    }

    .status-area { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
    .status-dot.connected { background: #4ec9b0; }
    .status-dot.disconnected { background: #e94560; }
    .status-text { font-size: 12px; color: #888; }
    .status-text.connected { color: #4ec9b0; }
    .status-text.disconnected { color: #e94560; }

    /* Main layout */
    .main { display: flex; height: calc(100vh - 48px); }

    /* Deck panel */
    .deck-panel {
      flex: 1; min-width: 300px; position: relative; overflow: hidden;
      border-right: 1px solid #333;
    }
    #kanvas { width: 100%; height: 100%; background: #f8f8f8; }

    /* Resize handle */
    .resize-handle { width: 4px; cursor: col-resize; background: #333; }
    .resize-handle:hover { background: #e94560; }

    /* Editor panel */
    .editor-panel {
      width: 550px; min-width: 300px; display: flex; flex-direction: column;
      background: #1e1e2e;
    }

    /* Protocol list bar */
    .protocol-bar {
      display: flex; align-items: center; gap: 4px; padding: 4px 8px;
      background: #16213e; border-bottom: 1px solid #333;
      overflow-x: auto; white-space: nowrap;
    }
    .protocol-item {
      padding: 3px 10px; border: 1px solid #333; background: #1e1e2e; color: #aaa;
      border-radius: 3px; cursor: pointer; font-size: 11px;
    }
    .protocol-item:hover { background: #0f3460; color: #eee; }

    /* Monaco editor container */
    #editor-container { flex: 1; min-height: 200px; }

    /* Console */
    .console-area {
      height: 200px; min-height: 100px; border-top: 1px solid #333;
      display: flex; flex-direction: column;
    }
    .console-header {
      padding: 5px 12px; background: #16213e; font-size: 11px;
      color: #e94560; text-transform: uppercase; letter-spacing: 1px;
      border-bottom: 1px solid #333;
      display: flex; align-items: center; justify-content: space-between;
    }
    .console-header button {
      padding: 2px 8px; border: 1px solid #444; background: transparent; color: #888;
      border-radius: 3px; cursor: pointer; font-size: 10px;
    }
    .console-header button:hover { color: #eee; }
    #console-output {
      flex: 1; overflow-y: auto; padding: 8px 12px;
      font-family: 'Courier New', monospace; font-size: 12px;
      background: #0a0a1a;
    }
    .console-line { margin-bottom: 1px; white-space: pre-wrap; }
    .console-line.stdout { color: #ccc; }
    .console-line.stderr { color: #e94560; }
    .console-line.info { color: #4ec9b0; }

    /* Hide visualizer UI elements not needed in runner */
    #resource-tree, #coords-panel, .side-panel { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PyLabRobot Runner</h1>
    <div class="toolbar">
      <button onclick="newProtocol()">New</button>
      <button onclick="saveCurrentProtocol()">Save</button>
      <button class="primary" id="btn-run" onclick="runProtocol()" disabled>Run</button>
      <button id="btn-stop" onclick="stopProtocol()" disabled>Stop</button>
    </div>
    <span id="protocol-name">untitled</span>
    <div class="status-area">
      <div class="status-dot" id="status-indicator"></div>
      <span class="status-text" id="status-label">Connecting...</span>
    </div>
  </div>

  <div class="main">
    <div class="deck-panel">
      <div id="kanvas"></div>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
    <div class="editor-panel">
      <div class="protocol-bar">
        <button class="protocol-item" onclick="newProtocol()" style="color:#e94560;border-color:#e94560">+</button>
        <div id="protocol-list" style="display:contents"></div>
      </div>
      <div id="editor-container"></div>
      <div class="console-area">
        <div class="console-header">
          <span>Console</span>
          <button onclick="clearConsole()">Clear</button>
        </div>
        <div id="console-output"></div>
      </div>
    </div>
  </div>

  <!-- Hidden elements expected by lib.js -->
  <div id="resource-tree" style="display:none"></div>
  <input id="coords-wrt-ref" type="hidden" value="">
  <span id="coords-x-ref" style="display:none"></span>
  <span id="coords-y-ref" style="display:none"></span>
  <span id="coords-z-ref" style="display:none"></span>
  <span id="coords-wrt-x-ref" style="display:none"></span>
  <span id="coords-wrt-y-ref" style="display:none"></span>
  <span id="coords-wrt-z-ref" style="display:none"></span>
  <input id="delta-lines-toggle" type="hidden" value="">

  <script>
    // Stub functions expected by lib.js
    function buildResourceTree() {}
    function addResourceToTree() {}
    function removeResourceFromTree() {}
    function updateSidepanelState() {}
    function openAllMachineToolPanels() {}

    function clearConsole() { document.getElementById("console-output").innerHTML = ""; }

    async function runProtocol() {
      if (!editor) return;
      const code = editor.getValue();
      document.getElementById("btn-run").disabled = true;
      document.getElementById("btn-stop").disabled = false;
      try {
        const resp = await fetch("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: code }),
        });
        const data = await resp.json();
        if (!resp.ok) appendConsole(data.detail || "Run failed", "stderr");
      } catch (e) {
        appendConsole("Run request failed: " + e, "stderr");
      }
      pollExecutionStatus();
    }

    function stopProtocol() {
      fetch("/api/run/stop", { method: "POST" });
    }

    function pollExecutionStatus() {
      const poll = setInterval(async () => {
        try {
          const resp = await fetch("/api/run/status");
          const data = await resp.json();
          if (data.state !== "running") {
            clearInterval(poll);
            document.getElementById("btn-run").disabled = false;
            document.getElementById("btn-stop").disabled = true;
          }
        } catch (e) {
          clearInterval(poll);
        }
      }, 500);
    }

    // Resize handle
    const resizeHandle = document.getElementById('resize-handle');
    const editorPanel = document.querySelector('.editor-panel');
    let isResizing = false;
    resizeHandle.addEventListener('mousedown', () => {
      isResizing = true;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const newWidth = document.body.clientWidth - e.clientX;
      editorPanel.style.width = Math.max(250, Math.min(900, newWidth)) + 'px';
    });
    document.addEventListener('mouseup', () => {
      isResizing = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  </script>

  <!-- Konva rendering layer from pylabrobot visualizer -->
  <script src="/static/lib.js"></script>
  <script>mode = MODE_VISUALIZER;</script>
  <!-- Monaco Editor loader -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs/loader.js"></script>
  <!-- Runner modules -->
  <script src="/static/editor.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
